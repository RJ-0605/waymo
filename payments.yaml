apiVersion: apps/v1
kind: Deployment

metadata:
  name: payment-api
  namespace: payments

spec:
  replicas: 1

  selector:
    matchLabels:
      app: payment-api

  template:
    metadata:
      labels:
        app: payment-api

    spec:
      containers:
        - name: payment-api

          image: kwao75/payment-api:v1

          ports:
            - containerPort: 8000
---
apiVersion: v1
kind: Service

metadata:
  name: payment-api
  namespace: payments

spec:
  selector:
    app: payment-api

  ports:
    - port: 8000
      targetPort: 8000
