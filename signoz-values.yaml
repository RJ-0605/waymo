global:
  storageClass: "local-path" # ← Replace if your cluster uses a different class

clickhouse:
  persistence:
    enabled: true
    size: 20Gi # Adjust based on expected telemetry volume

signoz-otel-collector:
  resources:
    requests: { memory: 512Mi, cpu: 250m }
    limits: { memory: 1Gi, cpu: 500m }
  config:
    receivers:
      otlp:
        protocols:
          grpc: { endpoint: 0.0.0.0:4317 }
          http: { endpoint: 0.0.0.0:4318 }
      prometheus:
        config:
          scrape_configs:
            - job_name: "payment-api"
              scrape_interval: 15s
              static_configs:
                # Kubernetes DNS: service.namespace.svc.cluster.local:port
                - targets: ["payment-api.payments.svc.cluster.local:8000"]
    processors:
      batch: {}
      memory_limiter:
        check_interval: 5s
        limit_mib: 800
        spike_limit_mib: 200
    service:
      pipelines:
        metrics:
          receivers: [otlp, prometheus]
          processors: [memory_limiter, batch]
          exporters: [clickhouse]
        traces:
          receivers: [otlp]
          processors: [memory_limiter, batch]
          exporters: [clickhouse]
